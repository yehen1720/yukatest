<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家具チェッカー</title>
  <style>
    :root {
      --bg: #f5efe4;
      --panel: rgba(255, 250, 243, 0.88);
      --card: #fffdf8;
      --line: #d9c9ae;
      --text: #3a2c1e;
      --sub: #786552;
      --accent: #bf7b3d;
      --accent-strong: #92521c;
      --ok: #5f8f5b;
      --shadow: 0 18px 40px rgba(92, 63, 32, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 231, 189, 0.9), transparent 30%),
        radial-gradient(circle at top right, rgba(203, 226, 201, 0.8), transparent 28%),
        linear-gradient(180deg, #f9f3e8 0%, #efe4d1 100%);
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 32px auto;
      padding: 28px;
      border: 1px solid rgba(140, 103, 60, 0.15);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: 0.04em;
    }

    .lead {
      margin: 0;
      color: var(--sub);
      font-size: 1rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.5fr 1fr auto;
      gap: 14px;
      align-items: center;
      margin: 24px 0 18px;
    }

    .search,
    .select,
    .action {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
    }

    .action {
      width: auto;
      cursor: pointer;
      background: linear-gradient(180deg, #d39658, #bc7338);
      color: #fffaf3;
      border: none;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .action:hover,
    .action:focus-visible {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .stat {
      padding: 16px 18px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid rgba(191, 123, 61, 0.18);
    }

    .stat-label {
      display: block;
      margin-bottom: 6px;
      color: var(--sub);
      font-size: 0.92rem;
    }

    .stat-value {
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      font-weight: 800;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .item {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 15px 16px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid rgba(140, 103, 60, 0.15);
      box-shadow: 0 8px 20px rgba(92, 63, 32, 0.06);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .item:hover {
      transform: translateY(-2px);
      border-color: rgba(191, 123, 61, 0.45);
      box-shadow: 0 14px 24px rgba(92, 63, 32, 0.1);
    }

    .item.owned {
      border-color: rgba(95, 143, 91, 0.5);
      background: linear-gradient(180deg, #fffdf8 0%, #f3fbef 100%);
    }

    .check {
      margin-top: 2px;
      width: 20px;
      height: 20px;
      accent-color: var(--ok);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .item-name {
      font-size: 0.98rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .owned .item-name {
      color: var(--accent-strong);
      font-weight: 700;
    }

    .empty {
      display: none;
      padding: 24px;
      text-align: center;
      color: var(--sub);
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.65);
    }

    .footer-note {
      margin-top: 18px;
      color: var(--sub);
      font-size: 0.92rem;
    }

    @media (max-width: 800px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .action {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .page {
        width: min(100% - 18px, 1000px);
        margin: 10px auto;
        padding: 20px 14px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>家具チェッカー</h1>
    <p class="lead">所持している家具にチェックを入れるだけで進捗を管理できます。チェック状態はこのブラウザに保存されます。</p>

    <section class="toolbar" aria-label="操作エリア">
      <input id="searchInput" class="search" type="search" placeholder="家具名で検索">
      <select id="filterSelect" class="select" aria-label="表示フィルター">
        <option value="all">すべて表示</option>
        <option value="owned">所持しているものだけ</option>
        <option value="missing">未所持だけ</option>
      </select>
      <button id="clearButton" class="action" type="button">チェックを全部外す</button>
    </section>

    <section class="stats" aria-label="集計">
      <article class="stat">
        <span class="stat-label">総数</span>
        <strong id="totalCount" class="stat-value">0</strong>
      </article>
      <article class="stat">
        <span class="stat-label">所持数</span>
        <strong id="ownedCount" class="stat-value">0</strong>
      </article>
      <article class="stat">
        <span class="stat-label">達成率</span>
        <strong id="progressCount" class="stat-value">0%</strong>
      </article>
    </section>

    <section id="list" class="list" aria-live="polite"></section>
    <p id="emptyState" class="empty">条件に合う家具が見つかりませんでした。</p>
    <p class="footer-note">「画像」は一覧取り込み時のノイズとして除外しています。</p>
  </main>

  <script>
    const rawFurnitureText = `
アーケードゲーム(FTG)画像アーケードゲーム(FTG)	アーケードゲーム(STG)画像アーケードゲーム(STG)	アーケードゲーム(TBL)画像アーケードゲーム(TBL)	アームのフロアランプ画像アームのフロアランプ
アイランドキッチン画像アイランドキッチン	アイロン画像アイロン	アイロンだい画像アイロンだい	アウトドアテーブル画像アウトドアテーブル
アウトドアなあみ画像アウトドアなあみ	アウトドアなジョウロ画像アウトドアなジョウロ	アウトドアなスコップ画像アウトドアなスコップ	アウトドアなつりざお画像アウトドアなつりざお
アウトドアなパチンコ画像アウトドアなパチンコ	アウトドアはつでんき画像アウトドアはつでんき	アウトドアベンチ画像アウトドアベンチ	あおコーナー画像あおコーナー
あかコーナー画像あかコーナー	アクセサリースタンド画像アクセサリースタンド	アップライトピアノ画像アップライトピアノ	アメフトボール画像アメフトボール
アルコールランプ画像アルコールランプ	アルテミアすいそう画像アルテミアすいそう	アルトサックス画像アルトサックス	アロマスティック画像アロマスティック
アロマディフューザー画像アロマディフューザー	アンスリウム画像アンスリウム	アンティークなイス画像アンティークなイス	アンティークなコンソール画像アンティークなコンソール
アンティークなテーブル画像アンティークなテーブル	アンティークなでんわ画像アンティークなでんわ	アンティークなとけい画像アンティークなとけい	アンティークなドレッサー画像アンティークなドレッサー
アンティークなビューロ画像アンティークなビューロ	アンティークなベッド画像アンティークなベッド	アンティークなミニテーブル画像アンティークなミニテーブル	アンティークなワードローブ画像アンティークなワードローブ
アントファーム画像アントファーム	あんどん画像あんどん	アンプ画像アンプ	いっとかん画像いっとかん
いとぐるま画像いとぐるま	いぬのぬいぐるみ画像いぬのぬいぐるみ	インターフォンモニター画像インターフォンモニター	ヴァイオリン画像ヴァイオリン
ウォーターサーバー画像ウォーターサーバー	ウォータージャグ画像ウォータージャグ	ウォータービュー画像ウォータービュー	ウォールクロック画像ウォールクロック
うきわ画像うきわ	うたげのキャンドル画像うたげのキャンドル	ウッドシェードランプ画像ウッドシェードランプ	ウッドペンダントライト画像ウッドペンダントライト
うらないセット画像うらないセット	エアーソファ画像エアーソファ	エアコン画像エアコン	えいしゃき画像えいしゃき
えきしょうテレビ20インチ画像えきしょうテレビ20インチ	えきしょうテレビ50インチ画像えきしょうテレビ50インチ	エクササイズバイク画像エクササイズバイク	エスプレッソマシン画像エスプレッソマシン
エスプレッソメーカー画像エスプレッソメーカー	エフェクターセット画像エフェクターセット	エフェクターラック画像エフェクターラック	エレガントなコモード画像エレガントなコモード
エレガントなコンソール画像エレガントなコンソール	エレガントなソファ画像エレガントなソファ	エレガントなチェア画像エレガントなチェア	エレガントなベッド画像エレガントなベッド
エレガントなミラー画像エレガントなミラー	エレガントなランプ画像エレガントなランプ	エレキギターES1画像エレキギターES1	エレキギターES2画像エレキギターES2
エレキベース画像エレキベース	オーニソプター画像オーニソプター	オーブンつきコンロ画像オーブンつきコンロ	オープンリールデッキ画像オープンリールデッキ
おえかきセット画像おえかきセット	おきかがみ画像おきかがみ	おこう画像おこう	おサカナつりざお画像おサカナつりざお
おすのフラミンゴ画像おすのフラミンゴ	おにんぎょう画像おにんぎょう	オフィスのチェア画像オフィスのチェア	オフィスのデスク画像オフィスのデスク
おべんきょうセット画像おべんきょうセット	おもちゃばこ画像おもちゃばこ	オリエンタルなかざりだな画像オリエンタルなかざりだな	オリエンタルなスクリーン画像オリエンタルなスクリーン
オリエンタルなチェスト画像オリエンタルなチェスト	オリエンタルなベッド画像オリエンタルなベッド	オリエンタルなローテーブル画像オリエンタルなローテーブル
    `;

    const storageKey = "yuka-furniture-checker";
    const searchInput = document.getElementById("searchInput");
    const filterSelect = document.getElementById("filterSelect");
    const clearButton = document.getElementById("clearButton");
    const list = document.getElementById("list");
    const emptyState = document.getElementById("emptyState");
    const totalCount = document.getElementById("totalCount");
    const ownedCount = document.getElementById("ownedCount");
    const progressCount = document.getElementById("progressCount");

    const collapseDuplicatedName = (name) => {
      const trimmed = name.trim();
      if (!trimmed || trimmed.length % 2 !== 0) {
        return trimmed;
      }

      const half = trimmed.length / 2;
      const first = trimmed.slice(0, half);
      const second = trimmed.slice(half);
      return first === second ? first : trimmed;
    };

    const furnitureNames = Array.from(
      new Set(
        rawFurnitureText
          .split(/\s+/)
          .map((entry) => entry.replaceAll("画像", ""))
          .map(collapseDuplicatedName)
          .map((entry) => entry.trim())
          .filter(Boolean)
      )
    );

    const savedState = JSON.parse(localStorage.getItem(storageKey) || "{}");

    const render = () => {
      const query = searchInput.value.trim();
      const filter = filterSelect.value;
      const ownedNames = furnitureNames.filter((name) => savedState[name]);
      const progress = furnitureNames.length === 0 ? 0 : Math.round((ownedNames.length / furnitureNames.length) * 100);

      totalCount.textContent = String(furnitureNames.length);
      ownedCount.textContent = String(ownedNames.length);
      progressCount.textContent = `${progress}%`;

      list.innerHTML = "";

      const visibleItems = furnitureNames.filter((name) => {
        const matchesQuery = !query || name.includes(query);
        const isOwned = Boolean(savedState[name]);
        const matchesFilter =
          filter === "all" ||
          (filter === "owned" && isOwned) ||
          (filter === "missing" && !isOwned);
        return matchesQuery && matchesFilter;
      });

      visibleItems.forEach((name) => {
        const label = document.createElement("label");
        label.className = `item${savedState[name] ? " owned" : ""}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "check";
        checkbox.checked = Boolean(savedState[name]);
        checkbox.addEventListener("change", () => {
          savedState[name] = checkbox.checked;
          if (!checkbox.checked) {
            delete savedState[name];
          }
          localStorage.setItem(storageKey, JSON.stringify(savedState));
          render();
        });

        const title = document.createElement("span");
        title.className = "item-name";
        title.textContent = name;

        label.append(checkbox, title);
        list.appendChild(label);
      });

      emptyState.style.display = visibleItems.length === 0 ? "block" : "none";
    };

    searchInput.addEventListener("input", render);
    filterSelect.addEventListener("change", render);

    clearButton.addEventListener("click", () => {
      const confirmed = window.confirm("チェックをすべて外します。よろしいですか？");
      if (!confirmed) {
        return;
      }

      localStorage.removeItem(storageKey);
      Object.keys(savedState).forEach((key) => delete savedState[key]);
      render();
    });

    render();
  </script>
</body>
</html>
